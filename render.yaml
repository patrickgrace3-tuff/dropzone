services:
  # Backend API
  - type: web
    name: dropzone-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dropzone-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://dropzone-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: dropzone-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dropzone-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: dropzone-db
    databaseName: dropzone
    user: dropzone
    plan: free
